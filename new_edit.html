## 什么是原型链？

在 JavaScript 中，每个对象都有一个内部属性 `[[Prototype]]`，它指向该对象的**原型对象**。

```javascript
const animal = {
  type: 'Animal',
  describe() {
    return `I am a ${this.type}`;
  }
};
const dog = Object.create(animal);
dog.type = 'Dog';
console.log(dog.describe()); // "I am a Dog"
```
